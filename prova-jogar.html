<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fazer Prova</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1f2225">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Estudos">
</head>
<body>

<nav class="topnav">
  <div class="nav-links">
    <a href="index.html">Início</a>
    <a href="diario.html">Diário de Estudos</a>
    <a href="provas.html" class="active">Provas</a>
    <a href="revisao.html">Revisão</a>
    <a href="mural.html">Mural</a>
  </div>
  <div id="profile-chip"></div>
  <button id="theme-toggle" title="Alternar tema claro/escuro">🌙</button>
</nav>

<div class="wrap">
  <header class="page-header" id="quiz-header">
    <h1 id="quiz-title">Carregando prova...</h1>
    <p id="quiz-subtitle"></p>
  </header>

  <div class="notice">As respostas corretas só aparecem depois de clicar em <strong>Enviar prova</strong>.</div>

  <form id="quiz-form"></form>

  <div id="result-panel" class="card" style="display:none; text-align:center; border:2px solid var(--ink);">
    <h2>Prova enviada!</h2>
    <div class="score" style="font-size:2.2rem; font-weight:700;" id="score-display"></div>
    <p id="score-detail" style="font-family:'Helvetica Neue',Arial,sans-serif; color:var(--muted);"></p>
    <a href="provas.html" class="btn secondary" style="margin-top:10px;">Voltar para provas</a>
  </div>
</div>

<script type="module">
import { setupThemeToggle } from "./theme.js";
setupThemeToggle();

import { requireLogin, mountProfileChip } from "./auth.js";
import { getQuizById, getAllQuizzesOnce, getAllQuizAttemptsOnce, addQuizAttempt, upsertWrongQuestion, removeWrongQuestion } from "./firebase-init.js";
import { subjectLabel } from "./subjects.js";
import { successFeedback } from "./haptics.js";

const myName = await requireLogin();
mountProfileChip(myName);
const params = new URLSearchParams(window.location.search);
const quizId = params.get('id');
const isRandom = params.get('random') === '1';
const isAI = params.get('ia') === '1';
const randomCount = parseInt(params.get('n')) || 15;

if(isAI){
  loadAIQuiz();
} else if(isRandom){
  loadRandomQuiz();
} else if(!quizId){
  document.getElementById('quiz-title').textContent = 'Prova não encontrada';
  document.getElementById('quiz-subtitle').textContent = 'Volte para a lista de provas e escolha uma.';
} else {
  loadQuiz(quizId);
}

async function loadQuiz(id){
  try{
    const quiz = await getQuizById(id);
    if(!quiz){
      document.getElementById('quiz-title').textContent = 'Prova não encontrada';
      return;
    }
    if(!Array.isArray(quiz.questions) || quiz.questions.length === 0){
      document.getElementById('quiz-title').textContent = quiz.title || 'Prova sem questões';
      document.getElementById('quiz-subtitle').innerHTML = '<span style="color:var(--bad);">Essa prova não tem nenhuma questão cadastrada. Volte pra lista de provas.</span>';
      return;
    }
    if(quiz.availableAt && new Date(quiz.availableAt) > new Date()){
      document.getElementById('quiz-title').textContent = quiz.title || 'Prova bloqueada';
      document.getElementById('quiz-subtitle').innerHTML = '<span style="color:var(--bad);">🔒 Essa prova ainda não está disponível. Libera em ' + new Date(quiz.availableAt).toLocaleString('pt-BR', {dateStyle:'short', timeStyle:'short'}) + '.</span>';
      return;
    }
    // marca a origem de cada questão (pra banco de erradas funcionar igual no modo normal e aleatório)
    quiz.questions = quiz.questions.map(q => ({ ...q, sourceQuizId: quiz.id, sourceQuizTitle: quiz.title, subject: q.subject || 'geral' }));
    document.getElementById('quiz-title').textContent = quiz.title;
    document.getElementById('quiz-subtitle').textContent = quiz.questions.length + ' questões · criada em ' + new Date(quiz.dateCreated).toLocaleDateString('pt-BR');
    renderForm(quiz);
  }catch(err){
    console.error('Erro ao carregar prova:', err);
    document.getElementById('quiz-title').textContent = 'Não foi possível carregar esta prova';
    document.getElementById('quiz-subtitle').innerHTML = '<span style="color:var(--bad);">Erro técnico: ' + escapeHtml(err.message || String(err)) + '</span>';
  }
}

function loadAIQuiz(){
  try{
    const raw = sessionStorage.getItem('aiGeneratedQuiz');
    sessionStorage.removeItem('aiGeneratedQuiz');
    if(!raw){
      document.getElementById('quiz-title').textContent = 'Nenhuma prova gerada encontrada';
      document.getElementById('quiz-subtitle').innerHTML = 'Volte na Revisão e clique em "Gerar prova" de novo. <a href="revisao.html">Ir para Revisão</a>.';
      return;
    }
    const quiz = JSON.parse(raw);
    if(!Array.isArray(quiz.questions) || quiz.questions.length === 0){
      document.getElementById('quiz-title').textContent = 'A IA não gerou questões';
      document.getElementById('quiz-subtitle').innerHTML = '<a href="revisao.html">Voltar para Revisão</a>.';
      return;
    }
    quiz.questions = quiz.questions.map(q => ({ ...q, sourceQuizId: quiz.id, sourceQuizTitle: quiz.title, subject: q.subject || 'geral' }));
    document.getElementById('quiz-title').textContent = quiz.title;
    document.getElementById('quiz-subtitle').textContent = quiz.questions.length + ' questões inéditas geradas pela IA com base no que você mais erra · não conta pro placar geral';
    renderForm(quiz);
  }catch(err){
    console.error('Erro ao carregar prova da IA:', err);
    document.getElementById('quiz-title').textContent = 'Não foi possível carregar a prova gerada';
    document.getElementById('quiz-subtitle').innerHTML = '<span style="color:var(--bad);">Erro técnico: ' + escapeHtml(err.message || String(err)) + '</span>';
  }
}

async function loadRandomQuiz(){
  try{
    const allAttemptsOnce = await getAllQuizAttemptsOnce();

    // só entram no sorteio questões de provas que a própria pessoa já fez antes
    const doneQuizIds = new Set(
      allAttemptsOnce.filter(a => a.author === myName && !a.isRandom).map(a => a.quizId)
    );

    if(doneQuizIds.size === 0){
      document.getElementById('quiz-title').textContent = 'Faça uma prova normal primeiro';
      document.getElementById('quiz-subtitle').innerHTML = 'A Prova Aleatória só sorteia questões de provas que você já fez. <a href="provas.html">Escolha uma prova pra começar</a>.';
      return;
    }

    const allQuizzes = await getAllQuizzesOnce();
    let pool = [];
    allQuizzes.filter(q => doneQuizIds.has(q.id)).forEach(q => {
      (q.questions || []).forEach(question => {
        if(question.type !== 'discursive'){
          pool.push({ ...question, sourceQuizId: q.id, sourceQuizTitle: q.title, subject: question.subject || 'geral' });
        }
      });
    });

    if(pool.length === 0){
      document.getElementById('quiz-title').textContent = 'Ainda não há questões suficientes';
      document.getElementById('quiz-subtitle').textContent = 'As provas que você já fez não têm questões objetivas suficientes pro sorteio.';
      return;
    }

    // embaralhar (Fisher-Yates)
    for(let i = pool.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const selected = pool.slice(0, Math.min(randomCount, pool.length));

    const quiz = {
      id: 'random-' + Date.now(),
      title: '🎲 Prova Aleatória',
      dateCreated: new Date().toISOString(),
      isRandom: true,
      questions: selected
    };

    document.getElementById('quiz-title').textContent = quiz.title;
    document.getElementById('quiz-subtitle').textContent = quiz.questions.length + ' questões sorteadas das provas que você já fez';
    renderForm(quiz);
  }catch(err){
    console.error('Erro ao montar prova aleatória:', err);
    document.getElementById('quiz-title').textContent = 'Não foi possível montar a prova aleatória';
    document.getElementById('quiz-subtitle').innerHTML = '<span style="color:var(--bad);">Erro técnico: ' + escapeHtml(err.message || String(err)) + '</span>';
  }
}

function renderForm(quiz){
  const form = document.getElementById('quiz-form');
  form.innerHTML = quiz.questions.map((q, idx) => {
    if(q.type === 'discursive'){
      return `
        <div class="card" data-qid="${q.id}" data-type="discursive">
          <span class="entry-date">Questão ${idx+1} · Discursiva</span>
          <p style="font-size:1.02rem;">${escapeHtml(q.stem)}</p>
          <textarea name="${q.id}" placeholder="Escreva sua resposta aqui..."></textarea>
          <div class="feedback-box"></div>
        </div>
      `;
    }
    return `
      <div class="card" data-qid="${q.id}" data-type="${q.type}" data-correct="${q.correct}" data-subject="${q.subject}" data-source-quiz-id="${q.sourceQuizId}" data-source-quiz-title="${escapeHtml(q.sourceQuizTitle)}">
        <span class="entry-date">Questão ${idx+1} · ${subjectLabel(q.subject)}</span>
        <p style="font-size:1.02rem;">${escapeHtml(q.stem)}</p>
        <div class="options">
          ${(q.options || []).map(opt => `
            <label style="display:flex; gap:10px; align-items:flex-start; padding:8px 10px; font-family:'Helvetica Neue',Arial,sans-serif; font-size:0.95rem; cursor:pointer;">
              <input type="radio" name="${q.id}" value="${opt.value}"> ${escapeHtml(opt.label)}
            </label>
          `).join('')}
        </div>
        <div class="feedback-box"></div>
      </div>
    `;
  }).join('') + `
    <div id="submit-bar" style="position:sticky; bottom:0; background:var(--bg); padding:16px 0; border-top:1px solid var(--rule); margin-top:20px;">
      <button type="submit" class="btn" style="width:100%;" id="submit-btn">Enviar prova</button>
    </div>
  `;

  form.addEventListener('submit', (e) => onSubmit(e, quiz));
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

async function onSubmit(e, quiz){
  e.preventDefault();
  const cards = document.querySelectorAll('#quiz-form .card');
  let correctCount = 0, objectiveTotal = 0, unanswered = 0;
  const answers = [];
  const wrongOps = [];
  const rightOps = [];

  cards.forEach(card => {
    const type = card.dataset.type;
    const qid = card.dataset.qid;
    const fb = card.querySelector('.feedback-box');

    if(type === 'discursive'){
      const val = card.querySelector('textarea').value.trim();
      if(!val){ unanswered++; fb.textContent = 'Você não respondeu.'; }
      else { fb.textContent = 'Resposta registrada (avaliação livre entre vocês).'; }
      return;
    }

    objectiveTotal++;
    const subject = card.dataset.subject;
    const sourceQuizId = card.dataset.sourceQuizId;
    const sourceQuizTitle = card.dataset.sourceQuizTitle;
    const selected = card.querySelector('input[name="'+qid+'"]:checked');

    if(!selected){
      unanswered++;
      fb.innerHTML = '<span style="color:var(--muted); font-family:\'Helvetica Neue\',Arial,sans-serif; font-size:0.85rem;">Você não respondeu.</span>';
      answers.push({ questionId: qid, subject, correct: false });
      return;
    }

    const correct = card.dataset.correct;
    const isCorrect = selected.value === correct;
    answers.push({ questionId: qid, subject, correct: isCorrect });

    if(isCorrect){
      correctCount++;
      fb.innerHTML = '<span style="color:var(--ok); font-family:\'Helvetica Neue\',Arial,sans-serif; font-size:0.85rem;">✔ Correto!</span>';
      rightOps.push({ sourceQuizId, questionId: qid });
    } else {
      const correctLabel = card.querySelector('input[value="'+correct+'"]').closest('label').textContent.trim();
      fb.innerHTML = '<span style="color:var(--bad); font-family:\'Helvetica Neue\',Arial,sans-serif; font-size:0.85rem;">✘ Errado. Resposta certa: '+escapeHtml(correctLabel)+'</span>';
      const questionObj = quiz.questions.find(q => q.id === qid);
      wrongOps.push({
        author: myName,
        sourceQuizId,
        sourceQuizTitle,
        questionId: qid,
        subject,
        stem: questionObj ? questionObj.stem : '',
        options: questionObj ? questionObj.options : [],
        correct: correct,
        date: new Date().toISOString()
      });
    }
  });

  if(unanswered > 0){
    const proceed = confirm('Você deixou ' + unanswered + ' questão(ões) sem resposta. Enviar mesmo assim?');
    if(!proceed) return;
  }

  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-btn').textContent = 'Enviado';

  const percent = Math.round((correctCount / objectiveTotal) * 100);
  document.getElementById('score-display').textContent = correctCount + ' / ' + objectiveTotal;
  document.getElementById('score-detail').textContent = myName + ', você acertou ' + percent + '% das questões objetivas.' + (quiz.isRandom ? ' (não conta pro placar geral, é só revisão)' : '');
  document.getElementById('result-panel').style.display = 'block';
  document.getElementById('result-panel').scrollIntoView({behavior:'smooth'});
  successFeedback();

  try{
    await addQuizAttempt({
      author: myName,
      quizId: quiz.id,
      quizTitle: quiz.title,
      correct: correctCount,
      total: objectiveTotal,
      percent: percent,
      answers: answers,
      isRandom: !!quiz.isRandom,
      date: new Date().toISOString()
    });
  }catch(err){
    console.error('Não foi possível salvar a tentativa', err);
  }

  // atualizar banco de questões erradas (adiciona as novas erradas, remove as que acertou)
  try{
    await Promise.all(wrongOps.map(w => upsertWrongQuestion(w)));
    await Promise.all(rightOps.map(r => removeWrongQuestion(myName, r.sourceQuizId, r.questionId)));
  }catch(err){
    console.error('Não foi possível atualizar o banco de questões erradas', err);
  }
}
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
