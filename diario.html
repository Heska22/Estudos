<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário de Estudos</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="topnav">
  <div class="nav-links">
    <a href="index.html">Início</a>
    <a href="diario.html" class="active">Diário de Estudos</a>
    <a href="provas.html">Provas</a>
    <a href="revisao.html">Revisão</a>
    <a href="mural.html">Mural</a>
  </div>
  <button id="theme-toggle" title="Alternar tema claro/escuro">🌙</button>
</nav>

<div class="wrap">
  <header class="page-header">
    <h1>Diário de Estudos</h1>
    <p>Pode registrar quantas vezes quiser no mesmo dia, em qualquer matéria</p>
  </header>

  <div class="card">
    <form id="entry-form">
      <div class="two-col">
        <div>
          <label class="field-label">Data</label>
          <input type="date" id="entry-date" required>
        </div>
        <div>
          <label class="field-label">Matéria</label>
          <select id="entry-subject"></select>
        </div>
      </div>

      <div id="custom-subject-wrap" style="display:none;">
        <label class="field-label">Qual matéria?</label>
        <input type="text" id="entry-custom-subject" placeholder="Ex: Redação, Espanhol, Ciências...">
      </div>

      <label class="field-label">O que você estudou? (seja específico: o que leu, o que praticou, o que ainda não entendeu)</label>
      <textarea id="entry-notes" placeholder="Ex: Revisei os 20 primeiros elementos, treinei os símbolos de memória e fiz 10 flashcards dos halogênios e gases nobres. Ainda tenho dúvida em metais de transição." required></textarea>

      <div class="two-col">
        <div>
          <label class="field-label">Tempo estudado (minutos)</label>
          <input type="text" id="entry-minutes" placeholder="Ex: 45">
        </div>
        <div>
          <label class="field-label">Como achou a dificuldade?</label>
          <select id="entry-difficulty">
            <option value="facil">Fácil</option>
            <option value="medio" selected>Médio</option>
            <option value="dificil">Difícil</option>
          </select>
        </div>
      </div>

      <label class="field-label">Tags (separadas por vírgula, opcional)</label>
      <input type="text" id="entry-tags" placeholder="Ex: flashcards, revisão, halogênios">

      <label class="field-label">Foto (opcional — print, foto do caderno, etc.)</label>
      <input type="file" id="entry-photo" accept="image/*">
      <div id="photo-preview" style="margin-bottom:16px;"></div>

      <button type="submit" class="btn" id="submit-btn">Salvar registro</button>
      <button type="button" class="btn secondary" id="cancel-edit-btn" style="display:none;">Cancelar edição</button>
    </form>
  </div>

  <div class="card">
    <h3 style="margin-top:0;">Registros</h3>
    <div class="two-col" style="margin-bottom:16px;">
      <select id="filter-subject"><option value="all">Todas as matérias</option></select>
      <select id="filter-author"><option value="all">Todos</option></select>
    </div>
    <div id="entries-list" class="loading-text">Carregando...</div>
  </div>
</div>

<script type="module">
import { setupThemeToggle } from "./theme.js";
setupThemeToggle();

import { ensureMyName, addStudyEntry, updateStudyEntry, deleteStudyEntry, listenStudyEntries } from "./firebase-init.js";
import { SUBJECTS, subjectLabel, subjectColor } from "./subjects.js";
import { getAvatarColor } from "./gamification.js";

const myName = ensureMyName();
document.getElementById('entry-date').valueAsDate = new Date();
let editingId = null;

// popular selects de matéria
const subjectSelect = document.getElementById('entry-subject');
const filterSubjectSelect = document.getElementById('filter-subject');
SUBJECTS.forEach(s => {
  subjectSelect.innerHTML += `<option value="${s.id}">${s.label}</option>`;
  filterSubjectSelect.innerHTML += `<option value="${s.id}">${s.label}</option>`;
});

subjectSelect.addEventListener('change', () => {
  document.getElementById('custom-subject-wrap').style.display = subjectSelect.value === 'outro' ? 'block' : 'none';
});

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

let pendingPhoto = null;
document.getElementById('entry-photo').addEventListener('change', function(e){
  const file = e.target.files[0];
  const preview = document.getElementById('photo-preview');
  if(!file){ pendingPhoto = null; preview.innerHTML = ''; return; }

  if(file.size > 900 * 1024){
    alert('Essa imagem é grande demais para o banco de dados (limite de ~900KB). Tente uma foto menor ou comprimida.');
    e.target.value = '';
    pendingPhoto = null;
    preview.innerHTML = '';
    return;
  }

  const reader = new FileReader();
  reader.onload = function(ev){
    pendingPhoto = ev.target.result;
    preview.innerHTML = '<img src="'+pendingPhoto+'" style="max-width:140px; border-radius:10px; border:1px solid var(--rule);">';
  };
  reader.readAsDataURL(file);
});

document.getElementById('entry-form').addEventListener('submit', async function(e){
  e.preventDefault();

  const date = document.getElementById('entry-date').value;
  const subject = subjectSelect.value;
  const customSubject = document.getElementById('entry-custom-subject').value.trim();
  const notes = document.getElementById('entry-notes').value.trim();
  const minutes = document.getElementById('entry-minutes').value.trim();
  const difficulty = document.getElementById('entry-difficulty').value;
  const tagsRaw = document.getElementById('entry-tags').value.trim();
  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

  if(!notes){ alert('Escreva um pouco sobre o que você estudou.'); return; }
  if(subject === 'outro' && !customSubject){ alert('Digite o nome da matéria.'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = editingId ? 'Salvando alterações...' : 'Salvando...';

  const payload = {
    date, subject,
    customSubject: subject === 'outro' ? customSubject : '',
    notes, minutes, difficulty, tags,
    photo: pendingPhoto
  };

  try{
    if(editingId){
      await updateStudyEntry(editingId, payload);
    } else {
      await addStudyEntry({ ...payload, author: myName, createdAt: Date.now() });
    }
    resetForm();
  }catch(err){
    console.error(err);
    alert('Não foi possível salvar agora. Verifique sua internet e tente de novo.');
  } finally {
    btn.disabled = false;
    btn.textContent = editingId ? 'Salvar alterações' : 'Salvar registro';
  }
});

function resetForm(){
  document.getElementById('entry-form').reset();
  document.getElementById('entry-date').valueAsDate = new Date();
  document.getElementById('photo-preview').innerHTML = '';
  document.getElementById('custom-subject-wrap').style.display = 'none';
  pendingPhoto = null;
  editingId = null;
  document.getElementById('submit-btn').textContent = 'Salvar registro';
  document.getElementById('cancel-edit-btn').style.display = 'none';
}

document.getElementById('cancel-edit-btn').addEventListener('click', resetForm);

function startEdit(entry){
  editingId = entry.id;
  document.getElementById('entry-date').value = entry.date;
  subjectSelect.value = entry.subject;
  document.getElementById('custom-subject-wrap').style.display = entry.subject === 'outro' ? 'block' : 'none';
  document.getElementById('entry-custom-subject').value = entry.customSubject || '';
  document.getElementById('entry-notes').value = entry.notes || '';
  document.getElementById('entry-minutes').value = entry.minutes || '';
  document.getElementById('entry-difficulty').value = entry.difficulty || 'medio';
  document.getElementById('entry-tags').value = (entry.tags || []).join(', ');
  pendingPhoto = entry.photo || null;
  document.getElementById('photo-preview').innerHTML = entry.photo
    ? `<img src="${entry.photo}" style="max-width:140px; border-radius:10px; border:1px solid var(--rule);">`
    : '';

  document.getElementById('submit-btn').textContent = 'Salvar alterações';
  document.getElementById('cancel-edit-btn').style.display = 'inline-block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

let allEntries = [];
let knownAuthors = [];
document.getElementById('filter-subject').addEventListener('change', renderEntries);
document.getElementById('filter-author').addEventListener('change', renderEntries);

function refreshAuthorFilterOptions(){
  const authors = [...new Set(allEntries.map(e => e.author).filter(Boolean))].sort();
  const changed = authors.length !== knownAuthors.length || authors.some((a,i) => a !== knownAuthors[i]);
  if(!changed) return;
  knownAuthors = authors;

  const select = document.getElementById('filter-author');
  const currentValue = select.value;
  select.innerHTML = '<option value="all">Todos</option>' + authors.map(a =>
    `<option value="${escapeHtml(a)}">${a === myName ? 'Meus registros' : escapeHtml(a)}</option>`
  ).join('');
  if([...select.options].some(o => o.value === currentValue)) select.value = currentValue;
}

function renderEntries(){
  refreshAuthorFilterOptions();

  const subjectFilter = document.getElementById('filter-subject').value;
  const authorFilter = document.getElementById('filter-author').value;

  let entries = [...allEntries];
  if(subjectFilter !== 'all') entries = entries.filter(e => e.subject === subjectFilter);
  if(authorFilter !== 'all') entries = entries.filter(e => e.author === authorFilter);

  const list = document.getElementById('entries-list');
  if(entries.length === 0){
    list.innerHTML = '<p class="empty-state">Nenhum registro por aqui ainda.</p>';
    return;
  }

  const groups = {};
  entries.forEach(e => {
    if(!groups[e.date]) groups[e.date] = [];
    groups[e.date].push(e);
  });
  const sortedDates = Object.keys(groups).sort((a,b) => new Date(b) - new Date(a));

  list.innerHTML = sortedDates.map(date => `
    <div class="day-group">
      <div class="day-label">${new Date(date).toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'2-digit'})}</div>
      ${groups[date].map(e => `
        <div class="entry" style="margin-bottom:14px; padding-bottom:14px; border-bottom:1px solid var(--rule);">
          ${e.photo ? `<img src="${e.photo}" alt="foto do estudo">` : ''}
          <div class="entry-body">
            <div class="meta-row">
              <span class="subject-tag" style="background:${subjectColor(e.subject)}">${escapeHtml(subjectLabel(e.subject, e.customSubject))}</span>
              <span class="author-badge" style="background:${getAvatarColor(e.author)};">${escapeHtml(e.author)}</span>
              ${e.minutes ? `<span class="chip">${escapeHtml(e.minutes)} min</span>` : ''}
              ${e.difficulty ? `<span class="chip ${e.difficulty}">${e.difficulty === 'facil' ? 'Fácil' : e.difficulty === 'dificil' ? 'Difícil' : 'Médio'}</span>` : ''}
            </div>
            <p class="entry-notes">${escapeHtml(e.notes)}</p>
            ${e.tags && e.tags.length ? `<div class="meta-row">${e.tags.map(t => `<span class="chip">#${escapeHtml(t)}</span>`).join('')}</div>` : ''}
            ${e.author === myName ? `
              <div class="meta-row" style="margin-top:8px;">
                <button class="btn secondary" style="padding:6px 14px; font-size:0.8rem;" data-edit-id="${e.id}">Editar</button>
                <button class="btn danger" data-delete-id="${e.id}">Excluir</button>
              </div>
            ` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

document.getElementById('entries-list').addEventListener('click', async (e) => {
  const editBtn = e.target.closest('[data-edit-id]');
  if(editBtn){
    const entry = allEntries.find(x => x.id === editBtn.dataset.editId);
    if(entry) startEdit(entry);
    return;
  }

  const btn = e.target.closest('[data-delete-id]');
  if(!btn) return;
  if(!confirm('Excluir este registro? Essa ação não pode ser desfeita.')) return;

  btn.disabled = true;
  btn.textContent = 'Excluindo...';
  try{
    await deleteStudyEntry(btn.dataset.deleteId);
  }catch(err){
    console.error(err);
    alert('Não foi possível excluir agora. Tente de novo.');
    btn.disabled = false;
    btn.textContent = 'Excluir';
  }
});

listenStudyEntries(
  (entries) => { allEntries = entries; renderEntries(); },
  () => {
    document.getElementById('entries-list').innerHTML = `
      <div class="error-state">
        Não consegui carregar os registros agora. Confira se as regras do Firestore foram publicadas e sua internet.
      </div>`;
  }
);
</script>

</body>
</html>
