<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Estudos</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="topnav">
  <a href="index.html" class="active">Início</a>
  <a href="diario.html">Diário de Estudos</a>
  <a href="provas.html">Provas</a>
</nav>

<div class="wrap">
  <header class="page-header">
    <h1>Painel de Estudos</h1>
    <p>Progresso de todo mundo que estuda por aqui, atualizado em tempo real</p>
  </header>

  <div class="tabs" id="tabs">
    <button data-filter="all" class="active">Todos</button>
  </div>

  <div id="stats-grid" class="stats-grid"></div>

  <div class="card">
    <h3 style="margin-top:0;">Últimos registros</h3>
    <div id="recent-entries" class="loading-text">Carregando...</div>
    <div style="margin-top:14px;">
      <a href="diario.html" class="btn">+ Novo registro de estudo</a>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0;">Últimas provas feitas</h3>
    <div id="last-quizzes" class="loading-text">Carregando...</div>
    <div style="margin-top:14px;">
      <a href="provas.html" class="btn secondary">Ver provas</a>
    </div>
  </div>
</div>

<script type="module">
import { ensureMyName, listenStudyEntries, listenQuizAttempts } from "./firebase-init.js";
import { subjectLabel, subjectColor } from "./subjects.js";

const myName = ensureMyName();
let currentFilter = 'all';
let allEntries = [];
let allAttempts = [];
let entriesLoaded = false;
let attemptsLoaded = false;
let knownAuthors = [];

document.getElementById('tabs').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if(!btn) return;
  document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  render();
});

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
function filterByAuthor(list){
  if(currentFilter === 'all') return list;
  return list.filter(x => x.author === currentFilter);
}

function refreshTabs(){
  const authors = [...new Set([...allEntries, ...allAttempts].map(x => x.author).filter(Boolean))].sort();
  const changed = authors.length !== knownAuthors.length || authors.some((a,i) => a !== knownAuthors[i]);
  if(!changed) return;
  knownAuthors = authors;

  const tabsEl = document.getElementById('tabs');
  const activeValue = currentFilter;
  tabsEl.innerHTML = '<button data-filter="all">Todos</button>' + authors.map(a =>
    `<button data-filter="${escapeHtml(a)}">${a === myName ? 'Meus registros' : escapeHtml(a)}</button>`
  ).join('');

  const matching = [...tabsEl.querySelectorAll('button')].find(b => b.dataset.filter === activeValue);
  if(matching){ matching.classList.add('active'); }
  else { tabsEl.querySelector('button').classList.add('active'); currentFilter = 'all'; }
}

function showErrorBox(elId, extra){
  document.getElementById(elId).innerHTML = `
    <div class="error-state">
      Não consegui carregar os dados agora.${extra || ''}<br>
      Confira se as regras do Firestore foram publicadas (Firebase Console → Firestore Database → Rules) e se sua internet está ok.
    </div>`;
}

function render(){
  if(!entriesLoaded || !attemptsLoaded) return;
  refreshTabs();

  const entries = filterByAuthor(allEntries);
  const attempts = filterByAuthor(allAttempts);

  const oneWeekAgo = new Date();
  oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
  const thisWeek = entries.filter(e => new Date(e.date) >= oneWeekAgo).length;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-box"><span class="num">${entries.length}</span><span class="label">Registros de estudo</span></div>
    <div class="stat-box"><span class="num">${thisWeek}</span><span class="label">Nos últimos 7 dias</span></div>
    <div class="stat-box"><span class="num">${attempts.length}</span><span class="label">Provas feitas</span></div>
  `;

  const recentBox = document.getElementById('recent-entries');
  if(entries.length === 0){
    recentBox.innerHTML = '<p class="empty-state">Nenhum registro por aqui ainda.</p>';
  } else {
    recentBox.innerHTML = entries.slice(0,4).map(e => `
      <div class="entry" style="margin-bottom:14px; padding-bottom:14px; border-bottom:1px solid var(--rule);">
        ${e.photo ? `<img src="${e.photo}" alt="foto do estudo">` : ''}
        <div class="entry-body">
          <div class="entry-date">${new Date(e.date).toLocaleDateString('pt-BR')} · <span class="author-badge">${escapeHtml(e.author)}</span></div>
          <span class="subject-tag" style="background:${subjectColor(e.subject)}">${escapeHtml(subjectLabel(e.subject, e.customSubject))}</span>
          <p class="entry-notes">${escapeHtml(e.notes)}</p>
        </div>
      </div>
    `).join('');
  }

  const lastQuizzesBox = document.getElementById('last-quizzes');
  if(attempts.length === 0){
    lastQuizzesBox.innerHTML = '<p class="empty-state">Nenhuma prova feita ainda.</p>';
  } else {
    lastQuizzesBox.innerHTML = attempts.slice(0,5).map(a => `
      <div class="quiz-list-item">
        <div>
          <p class="quiz-title" style="font-size:0.95rem;">${escapeHtml(a.quizTitle || 'Prova')}</p>
          <div class="quiz-meta"><span class="author-badge">${escapeHtml(a.author)}</span> · ${new Date(a.date).toLocaleDateString('pt-BR')}</div>
        </div>
        <strong>${a.correct}/${a.total} (${a.percent}%)</strong>
      </div>
    `).join('');
  }
}

listenStudyEntries(
  (entries) => { allEntries = entries; entriesLoaded = true; render(); },
  () => { showErrorBox('recent-entries'); }
);
listenQuizAttempts(
  (attempts) => { allAttempts = attempts; attemptsLoaded = true; render(); },
  () => { showErrorBox('last-quizzes'); }
);
</script>

</body>
</html>
